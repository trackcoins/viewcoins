        body {

            align-items: center;

        .container {

        .header {

        }

            width: 70px;

            background: linear-gradient(135deg, #f39c12, #e67e22);

            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
            border: 3px solid white;
        }
        
        .ball-icon svg {
            width: 45px;
            height: 45px;

        h1 {
            color: #2c3e50;
            font-size: 28px;

            letter-spacing: -0.5px;

        }

        }
        
        .telegram-link {
            color: #0088cc;
            font-weight: 600;

            background: #e8f4fd;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .telegram-link:hover {
            background: #0088cc;
            color: white;
            transform: translateY(-2px);
        }
        
        .code-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #e9ecef;
        }
        
        .code-label {
            font-size: 14px;
            color: #495057;

            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .code-input-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .code-input {
            width: 100%;
            padding: 18px 15px;

            border: 3px solid #dee2e6;
            border-radius: 15px;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 4px;
            background: white;
            transition: all 0.3s ease;
            -webkit-user-select: text;
            user-select: text;
        }
        
        .code-input:focus {
            outline: none;
            border-color: #f39c12;
            box-shadow: 0 0 0 4px rgba(243, 156, 18, 0.1);
        }
        
        .go-button {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 18px 20px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
        }
        
        .go-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(243, 156, 18, 0.4);
        }
        
        .go-button:active {
            transform: translateY(0);
        }
        
        .image-section {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #e9ecef;
        }
        
        .image-container {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.3s ease;
            border: 2px solid #dee2e6;
            overflow: hidden;
            position: relative;
        }
        
        .image-container:hover {
            transform: scale(1.01);
            border-color: #f39c12;
        }
        
        .image-container img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        
        .refresh-button-container {
            display: flex;
            justify-content: center;
            margin: 15px 0 5px;
        }
        
        .refresh-button {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        
        .refresh-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.4);
        }
        
        .refresh-button:active {
            transform: translateY(0);
        }
        
        .placeholder {
            text-align: center;
            padding: 80px 20px;
            color: #adb5bd;
            font-size: 18px;
            background: #f1f3f5;
            border-radius: 10px;
            font-weight: 500;
        }
        
        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status-error {
            background: #fee;
            color: #e74c3c;
            border: 1px solid #f5c6cb;
        }
        
        .status-success {
            background: #d4edda;
            color: #27ae60;
            border: 1px solid #c3e6cb;
        }
        
        .refresh-info {
            margin-top: 15px;
            font-size: 13px;
            color: #95a5a6;
            text-align: center;
            font-style: italic;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            color: #95a5a6;
            font-size: 12px;
        }
        
        /* Prevent image dragging and context menu */
        img {
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -o-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }
        
        /* Mobile optimizations */
        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .code-input {
                font-size: 20px;
                padding: 15px;
                letter-spacing: 2px;
            }
            
            .go-button {
                padding: 15px;
                font-size: 18px;
            }
            
            .ball-icon {
                width: 60px;
                height: 60px;
            }
            
            .ball-icon svg {
                width: 35px;
                height: 35px;
            }
            
            .refresh-button {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.keyCode === 73)) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.keyCode === 74)) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (e.key === 'U' || e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (e.key === 'S' || e.keyCode === 83)) {
                e.preventDefault();
                return false;
            }
            if (e.ctrlKey && (e.key === 'P' || e.keyCode === 80)) {
                e.preventDefault();
                return false;
            }
        });
        
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
        
        if (window.location.protocol === 'view-source:') {
            window.location.href = 'about:blank';
        }
        
        const allCodes = {"1": "Z7P3YB0C", "2": "7ACBQ9C4", "3": "2NL41ZOK", "4": "U9FME9MS"};
        const allImageUrls = {"1": ["https://lh3.googleusercontent.com/d/1I1fN-1VAb89AsFudMQJwp1hY37QvdYdU=w1000", "https://drive.usercontent.google.com/download?id=1I1fN-1VAb89AsFudMQJwp1hY37QvdYdU&export=view", "https://drive.google.com/thumbnail?id=1I1fN-1VAb89AsFudMQJwp1hY37QvdYdU&sz=w1000", "https://drive.google.com/uc?export=view&id=1I1fN-1VAb89AsFudMQJwp1hY37QvdYdU"], "2": ["https://lh3.googleusercontent.com/d/1-TcUrvPr0-2XLsrwh5txNIWYuXxQD3UR=w1000", "https://drive.usercontent.google.com/download?id=1-TcUrvPr0-2XLsrwh5txNIWYuXxQD3UR&export=view", "https://drive.google.com/thumbnail?id=1-TcUrvPr0-2XLsrwh5txNIWYuXxQD3UR&sz=w1000", "https://drive.google.com/uc?export=view&id=1-TcUrvPr0-2XLsrwh5txNIWYuXxQD3UR"], "3": ["https://lh3.googleusercontent.com/d/1AmI0QUc1Xo3PUM20yAY8ImzvFUTzbH-j=w1000", "https://drive.usercontent.google.com/download?id=1AmI0QUc1Xo3PUM20yAY8ImzvFUTzbH-j&export=view", "https://drive.google.com/thumbnail?id=1AmI0QUc1Xo3PUM20yAY8ImzvFUTzbH-j&sz=w1000", "https://drive.google.com/uc?export=view&id=1AmI0QUc1Xo3PUM20yAY8ImzvFUTzbH-j"], "4": ["https://lh3.googleusercontent.com/d/1T3E63AfsPhDSxknx3CBz9x-VKAz11eHK=w1000", "https://drive.usercontent.google.com/download?id=1T3E63AfsPhDSxknx3CBz9x-VKAz11eHK&export=view", "https://drive.google.com/thumbnail?id=1T3E63AfsPhDSxknx3CBz9x-VKAz11eHK&sz=w1000", "https://drive.google.com/uc?export=view&id=1T3E63AfsPhDSxknx3CBz9x-VKAz11eHK"]};
        const githubRawUrl = "https://raw.githubusercontent.com/princephonea2/coinview/main/index.html";
        const liveSiteUrl = "https://princephonea2.github.io/coinview/";
        const versionId = "1773237235";
        
        const wasAuthorized = localStorage.getItem('trackerAuthorized') === 'true';
        const storedCode = localStorage.getItem('trackerCode');
        const storedWindow = localStorage.getItem('trackerWindow');
        
        let currentWindow = 1;
        let validCode = allCodes[1];
        
        if (storedCode) {
            for (let i = 1; i <= 4; i++) {
                if (allCodes[i] === storedCode) {
                    currentWindow = i;
                    validCode = storedCode;
                    break;
                }
            }
        }
        
        let imageUrls = allImageUrls[currentWindow];
        
        let isAuthorized = false;
        if (storedCode === validCode && wasAuthorized) {
            isAuthorized = true;
        }
        
        let refreshInterval = null;
        let currentUrlIndex = 0;
        let loadAttempt = 0;
        
        const codeInput = document.getElementById('codeInput');
        const goButton = document.getElementById('goButton');
        const placeholder = document.getElementById('placeholder');
        const capturedImage = document.getElementById('capturedImage');
        const statusMessage = document.getElementById('statusMessage');
        const imageContainer = document.getElementById('imageContainer');
        const refreshButton = document.getElementById('refreshButton');
        
        if (isAuthorized) {
            refreshButton.style.display = 'inline-flex';
            tryLoadImage(0);
            refreshInterval = setInterval(() => {
                if (isAuthorized) {
                    tryLoadImage(currentUrlIndex);
                }
            }, 30000);
        }
        
        codeInput.addEventListener('touchstart', function() {
            this.focus();
        });
        
        async function checkForUpdatedCode() {
            try {
                const response = await fetch(githubRawUrl + '?_=' + Date.now());
                const latestHtml = await response.text();
                
                for (let i = 1; i <= 4; i++) {
                    const codeMatch = latestHtml.match(new RegExp(`allCodes = {.*?"${i}": "([A-Z0-9]+)"`));
                    if (codeMatch && codeMatch[1] !== allCodes[i]) {
                        statusMessage.className = 'status-message status-error';
                        statusMessage.textContent = '! New code detected, redirecting...';
                        setTimeout(() => {
                            window.location.href = liveSiteUrl + '?update=' + Date.now();
                        }, 1500);
                        return true;
                    }
                }
                return false;
            } catch (error) {
                console.log('Update check failed:', error);
                return false;
            }
        }
        
        async function tryLoadImage(startIndex = 0) {
            if (!isAuthorized) return;
            
            const updated = await checkForUpdatedCode();
            if (updated) return;
            
            loadAttempt++;
            const timestamp = Date.now();
            const random = Math.random().toString(36).substring(2, 15);
            
            if (startIndex >= imageUrls.length) {
                placeholder.textContent = '❌ Image not available';
                statusMessage.className = 'status-message status-error';
                statusMessage.textContent = '! Image not available';
                return;
            }
            
            let baseUrl = imageUrls[startIndex];
            const separator = baseUrl.includes('?') ? '&' : '?';
            const imageUrl = baseUrl + separator + '_cb=' + timestamp + '&_r=' + random;
            
            const newImage = new Image();
            
            newImage.onload = function() {
                capturedImage.src = this.src;
                capturedImage.style.display = 'block';
                placeholder.style.display = 'none';
                currentUrlIndex = startIndex;
                
                statusMessage.className = 'status-message status-success';
                statusMessage.textContent = '✓ Image updated';
                
                setTimeout(() => {
                    if (statusMessage.textContent === '✓ Image updated') {
                        statusMessage.textContent = '';
                    }
                }, 2000);
            };
            
            newImage.onerror = function() {
                setTimeout(() => {
                    if (isAuthorized) {
                        tryLoadImage(startIndex + 1);
                    }
                }, 500);
            };
            
            newImage.src = imageUrl;
        }
        
        refreshButton.addEventListener('click', async function() {
            if (isAuthorized) {
                statusMessage.className = 'status-message status-success';
                statusMessage.textContent = '↻ Checking for updates...';
                
                const updated = await checkForUpdatedCode();
                if (!updated) {
                    statusMessage.textContent = '↻ Refreshing image...';
                    tryLoadImage(0);
                }
            }
        });
        
        imageContainer.addEventListener('click', async function() {
            if (isAuthorized) {
                const updated = await checkForUpdatedCode();
                if (!updated) {
                    statusMessage.className = 'status-message status-success';
                    statusMessage.textContent = '↻ Refreshing...';
                    tryLoadImage(currentUrlIndex);
                }
            }
        });
        
        function checkCode() {
            const enteredCode = codeInput.value.trim().toUpperCase();
            
            let foundWindow = 0;
            for (let i = 1; i <= 4; i++) {
                if (enteredCode === allCodes[i]) {
                    foundWindow = i;
                    break;
                }
            }
            
            if (foundWindow > 0) {
                isAuthorized = true;
                currentWindow = foundWindow;
                validCode = allCodes[foundWindow];
                imageUrls = allImageUrls[foundWindow];
                
                loadAttempt = 0;
                refreshButton.style.display = 'inline-flex';
                
                localStorage.setItem('trackerAuthorized', 'true');
                localStorage.setItem('trackerCode', validCode);
                localStorage.setItem('trackerWindow', foundWindow);
                
                tryLoadImage(0);
                
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(() => {
                    if (isAuthorized) {
                        tryLoadImage(currentUrlIndex);
                    }
                }, 30000);
                
                statusMessage.className = 'status-message status-success';
                statusMessage.textContent = '✓ Access granted';
                
                setTimeout(() => {
                    if (statusMessage.textContent === '✓ Access granted') {
                        statusMessage.textContent = '';
                    }
                }, 2000);
                
                codeInput.value = '';
            } else {
                isAuthorized = false;
                capturedImage.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.textContent = '❌ Invalid code - access denied';
                refreshButton.style.display = 'none';
                
                localStorage.removeItem('trackerAuthorized');
                localStorage.removeItem('trackerCode');
                localStorage.removeItem('trackerWindow');
                
                if (refreshInterval) {
                    clearInterval(refreshInterval);
                    refreshInterval = null;
                }
                
                statusMessage.className = 'status-message status-error';
                statusMessage.textContent = '! Invalid access code';
                
                setTimeout(() => {
                    if (statusMessage.textContent === '! Invalid access code') {
                        statusMessage.textContent = '';
                        placeholder.textContent = '✨ Enter code to view live coins';
                    }
                }, 3000);
            }
        }
        
        goButton.addEventListener('click', checkCode);
        codeInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkCode();
            }
        });
        
        codeInput.addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });
        
        window.addEventListener('focus', function() {
            if (!isAuthorized) {
                codeInput.value = '';
            }
        });
        
        window.onload = function() {
            if (history.replaceState) {
                history.replaceState(null, null, location.href + '?_=' + Date.now());
            }
        };
        
        setInterval(async function() {
            if (isAuthorized) {
                await checkForUpdatedCode();
            }
        }, 30000);
        
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && isAuthorized) {
                checkForUpdatedCode();
            }
        });
    </script>
